<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Petites Machines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <main id="game">
    <canvas id="world"></canvas>

    <div class="ui">
      <a href="/" class="pill back">← Accueil</a>
      <div class="pill">
        <span id="agent">Choisis une machine en bas ↑</span>
      </div>
    </div>

    <div class="vehicle-bar">
      <button class="vehicle-btn" data-type="car" type="button">🚗 Voiture</button>
      <button class="vehicle-btn" data-type="truck" type="button">🚚 Camion</button>
      <button class="vehicle-btn" data-type="tractor" type="button">🚜 Tracteur</button>
      <button class="vehicle-btn" data-type="excavator" type="button">🚧 Pelleteuse</button>
    </div>
  </main>

  <script type="module" src="/src/machines.js"></script>
</body>
</html>
